/* CURSOR */
#cur,#cur-ring{display:none;}
@media(pointer:fine){
  #cur{display:block;position:fixed;z-index:99999;pointer-events:none;width:8px;height:8px;border-radius:50%;background:var(--cyan);transform:translate(-50%,-50%);box-shadow:0 0 12px var(--cyan);mix-blend-mode:screen;}

  body.hover #cur{background:var(--magenta);}
  body.hover #cur-ring{width:48px;height:48px;border-color:rgba(255,0,255,0.3);}
}

/* PARALLAX DEPTH LAYERS */
.p-far    { will-change: transform; transition: transform 0.12s ease-out; }
.p-mid    { will-change: transform; transition: transform 0.08s ease-out; }
.p-near   { will-change: transform; transition: transform 0.05s ease-out; }
.p-front  { will-change: transform; transition: transform 0.03s ease-out; }

/* ── GLASS LENS ──
   The CORRECT working approach:
   1. A full-page "warp layer" that is an exact visual copy of the page
      rendered via CSS filter:url(#warp-filter) which runs feTurbulence displacement
   2. This warp layer is clipped to the lens circle via clip-path
   3. Result: only the area under the lens shows the warped/distorted content
   4. The lens rim/specular sit on top as decoration
*/
#warp-layer{
  position:fixed;inset:0;z-index:800;pointer-events:none;
  /* This filter warps everything rendered inside this element */
  filter:url(#warp-filter);
  /* Clip to lens circle - updated via JS */
  clip-path:circle(0px at 50% 50%);
  -webkit-clip-path:circle(0px at 50% 50%);
  /* Force GPU layer */
  will-change:clip-path;
  /* The warp layer needs to show the page content - use backdrop-filter trick */
  backdrop-filter:brightness(1.12) saturate(1.6) contrast(1.05);
  -webkit-backdrop-filter:brightness(1.12) saturate(1.6) contrast(1.05);
  background:rgba(0,245,255,0.025);
}

/* lens decorations sit above warp layer */
#lens-deco{
  position:fixed;z-index:900;pointer-events:none;
  width:clamp(160px,20vw,280px);height:clamp(160px,20vw,280px);
  transform:translate(-50%,-50%);will-change:left,top;
  border-radius:50%;
  transition:border-radius 0.3s cubic-bezier(0.23,1,0.32,1);
}
#lens-rim{
  position:absolute;inset:0;border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.3);
  box-shadow:
    inset 0 0 0 1px rgba(0,245,255,0.4),
    inset 1px 1px 0 rgba(255,80,180,0.22),
    inset -1px -1px 0 rgba(100,200,255,0.22),
    0 0 40px rgba(0,245,255,0.2),
    0 0 80px rgba(180,140,255,0.12);
  animation:rimPulse 4s ease-in-out infinite;
}
#lens-spec{position:absolute;top:10%;left:12%;width:36%;height:24%;border-radius:50%;background:radial-gradient(ellipse at 38% 40%,rgba(255,255,255,0.88) 0%,rgba(255,255,255,0.25) 40%,transparent 100%);filter:blur(3px);animation:specShift 5s ease-in-out infinite;}
#lens-spec2{position:absolute;bottom:14%;right:12%;width:24%;height:17%;border-radius:50%;background:radial-gradient(ellipse,rgba(0,245,255,0.6) 0%,rgba(180,140,255,0.28) 50%,transparent 100%);filter:blur(5px);animation:specShift 7s ease-in-out infinite reverse;}

@keyframes specShift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(4px,3px) scale(1.07)}}
@keyframes rimPulse{
  0%,100%{box-shadow:inset 0 0 0 1px rgba(0,245,255,0.4),inset 1px 1px 0 rgba(255,80,180,0.22),inset -1px -1px 0 rgba(100,200,255,0.22),0 0 40px rgba(0,245,255,0.2),0 0 80px rgba(180,140,255,0.12);}
  50%{box-shadow:inset 0 0 0 1px rgba(0,245,255,0.6),inset 1px 1px 0 rgba(255,80,180,0.38),inset -1px -1px 0 rgba(100,200,255,0.38),0 0 60px rgba(0,245,255,0.32),0 0 120px rgba(180,140,255,0.2);}
}
#lens-deco.squish-h,#lens-deco.squish-h *{border-radius:56% 44%/42% 58%;}
#lens-deco.squish-v,#lens-deco.squish-v *{border-radius:42% 58%/56% 44%;}

/* KEYFRAMES */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes bar{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.3)}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlideDown{from{opacity:0;transform:translateY(-28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlideLeft{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeSlideRight{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleFade{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
@keyframes blurFade{from{opacity:0;filter:blur(14px)}to{opacity:1;filter:blur(0)}}
</style>

<svg style="position:fixed;width:0;height:0;pointer-events:none;" xmlns="http://www.w3.org/2000/svg">

    <filter id="warp-filter" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence id="warp-turb" type="fractalNoise" baseFrequency="0.012 0.015" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap id="warp-disp" in="SourceGraphic" in2="noise" scale="45" xChannelSelector="R" yChannelSelector="G"/>

    <filter id="bubble-warp" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">

<script>
// ── AUDIO AUTOPLAY (AudioContext unlock trick) ──
const bgAudio = document.getElementById('bg-audio');
const musicBtn = document.getElementById('btn-music');
bgAudio.volume = 0.55;
let musicPlaying = false;

// AudioContext trick — creates a silent buffer to unlock audio policy
function unlockAndPlay() {
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (AudioContext) {
    const ctx = new AudioContext();
    const buf = ctx.createBuffer(1, 1, 22050);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    src.connect(ctx.destination);
    src.start(0);
    ctx.resume().then(() => {
      bgAudio.play().then(() => {
        musicPlaying = true;
        musicBtn.classList.add('playing');
      }).catch(() => {});
    });
  } else {
    bgAudio.play().then(() => {
      musicPlaying = true;
      musicBtn.classList.add('playing');
    }).catch(() => {});
  }
}

// Try immediately
unlockAndPlay();

// Also try on first interaction as fallback
const firstTouch = () => {
  if (!musicPlaying) unlockAndPlay();
  window.removeEventListener('mousemove', firstTouch);
  window.removeEventListener('touchstart', firstTouch);
  window.removeEventListener('keydown', firstTouch);
};
window.addEventListener('mousemove', firstTouch, { once: true });
window.addEventListener('touchstart', firstTouch, { once: true });
window.addEventListener('keydown', firstTouch, { once: true });

// Button toggle

    bgAudio.pause();

      musicBtn.classList.add('playing');

});

// ── STAR BURST PAGE TRANSITION ──
const transCanvas = document.createElement('canvas');
transCanvas.style.cssText = 'position:fixed;inset:0;z-index:99990;pointer-events:none;';
document.body.appendChild(transCanvas);
const tCtx = transCanvas.getContext('2d');
function resizeTrans(){ transCanvas.width=innerWidth; transCanvas.height=innerHeight; }
resizeTrans(); window.addEventListener('resize', resizeTrans);

function burstTransition(href) {
  const cx = innerWidth/2, cy = innerHeight/2;
  const particles = [];
  const colors = ['#00f5ff','#ff00ff','#0080ff','#bf00ff','#ffffff','#00f5ff','#a040ff'];
  // spawn shooting stars from center
  for(let i=0;i<280;i++){
    const angle = Math.random()*Math.PI*2;
    const spd   = Math.random()*18+6;
    const len   = Math.random()*80+30;
    const col   = colors[Math.floor(Math.random()*colors.length)];
    particles.push({
      x:cx, y:cy,
      vx: Math.cos(angle)*spd,
      vy: Math.sin(angle)*spd,
      len, col,
      a:1, da: -(Math.random()*0.025+0.012),
      w: Math.random()*1.5+0.4,
    });
  }

  // white flash overlay
  const flash = document.createElement('div');
  flash.style.cssText='position:fixed;inset:0;z-index:99989;background:#fff;opacity:0;pointer-events:none;transition:opacity 0.12s ease;';
  document.body.appendChild(flash);
  setTimeout(()=>{ flash.style.opacity='0.85'; },0);
  setTimeout(()=>{ flash.style.opacity='0'; },150);

  let done = false;
  let elapsed = 0;
  function animBurst(){
    if(done) return;
    elapsed++;
    tCtx.clearRect(0,0,transCanvas.width,transCanvas.height);

    // dark overlay fades in after burst
    if(elapsed > 18){
      const fadeAlpha = Math.min((elapsed-18)/22, 1);
      tCtx.fillStyle = `rgba(0,4,8,${(fadeAlpha*0.95).toFixed(3)})`;
      tCtx.fillRect(0,0,transCanvas.width,transCanvas.height);
    }

    let alive = 0;
    particles.forEach(p=>{
      if(p.a<=0) return;
      alive++;
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.97; p.vy *= 0.97;
      p.a += p.da;

      const tx = p.x - p.vx*p.len*0.08;
      const ty = p.y - p.vy*p.len*0.08;

      const grad = tCtx.createLinearGradient(p.x,p.y,tx,ty);
      grad.addColorStop(0, p.col + Math.max(0,p.a).toFixed(3).replace('0.',',.').replace('1.000',',1)').replace(/,([^,]+)$/, `,${Math.max(0,p.a).toFixed(2)})`));
      
      const alpha = Math.max(0,p.a).toFixed(3);
      tCtx.beginPath();
      tCtx.moveTo(p.x,p.y);
      tCtx.lineTo(tx,ty);
      tCtx.strokeStyle = p.col;
      tCtx.globalAlpha = parseFloat(alpha);
      tCtx.lineWidth = p.w;
      tCtx.lineCap = 'round';
      tCtx.stroke();
      tCtx.globalAlpha = 1;
    });

    if(elapsed > 40 && alive === 0){
      done = true;
      tCtx.clearRect(0,0,transCanvas.width,transCanvas.height);
      window.location.href = href;
      return;
    }
    if(elapsed > 55){
      done = true;
      window.location.href = href;
      return;
    }
    requestAnimationFrame(animBurst);
  }
  animBurst();
}

// intercept nav link clicks — simple direct navigation with burst
document.querySelectorAll('.nav-link').forEach(link => {
  link.addEventListener('click', e => {
    const href = link.getAttribute('href');
    if (href && href !== '#' && !href.startsWith('javascript:')) {
      e.preventDefault();
      e.stopPropagation();
      if (typeof burstTransition === 'function') {
        burstTransition(href);
      } else {
        window.location.href = href;
      }
    }
  });
});

// ── PARALLAX DEPTH ──
const pFar   = document.querySelectorAll('.p-far');
const pMid   = document.querySelectorAll('.p-mid');
const pNear  = document.querySelectorAll('.p-near');
const pFront = document.querySelectorAll('.p-front');

let pMx = 0, pMy = 0;

document.addEventListener('mousemove', e => {
  // Normalize -1 to 1 from center
  pMx = (e.clientX / innerWidth  - 0.5) * 2;
  pMy = (e.clientY / innerHeight - 0.5) * 2;
});

// Smooth parallax values
let spx = 0, spy = 0;
(function animParallax() {
  spx += (pMx - spx) * 0.06;
  spy += (pMy - spy) * 0.06;

  // Far layer moves least — background depth
  pFar.forEach(el => {
    el.style.transform = `translate(${spx * -18}px, ${spy * -12}px)`;
  });
  // Mid layer — hero title
  pMid.forEach(el => {
    el.style.transform = `translate(${spx * -38}px, ${spy * -26}px)`;
  });
  // Near layer — subtitle, closer
  pNear.forEach(el => {
    el.style.transform = `translate(${spx * -55}px, ${spy * -36}px)`;
  });
  // Front layer — nav, closest to viewer
  pFront.forEach(el => {
    el.style.transform = `translate(${spx * 12}px, ${spy * 8}px)`;
  });

  requestAnimationFrame(animParallax);
})();

// ── STAR BG ──
const bgC=document.getElementById('bg-canvas'),bgX=bgC.getContext('2d');
let stars=[];
function resizeBg(){bgC.width=innerWidth;bgC.height=innerHeight;stars=Array.from({length:600},()=>({x:Math.random()*bgC.width,y:Math.random()*bgC.height,r:Math.random()*1.8+0.2,a:Math.random(),da:(Math.random()-0.5)*0.005,col:Math.random()>0.75?'rgba(0,245,255,':Math.random()>0.6?'rgba(255,0,255,':Math.random()>0.45?'rgba(0,128,255,':Math.random()>0.3?'rgba(180,100,255,':'rgba(180,220,255,'}));}
resizeBg();window.addEventListener('resize',resizeBg);
(function db(){bgX.clearRect(0,0,bgC.width,bgC.height);stars.forEach(s=>{s.a+=s.da;if(s.a<=0||s.a>=1)s.da*=-1;bgX.beginPath();bgX.arc(s.x,s.y,s.r,0,Math.PI*2);bgX.fillStyle=s.col+Math.max(0,Math.min(1,s.a)).toFixed(2)+')';bgX.fill();});requestAnimationFrame(db);})();

// ── CURSOR PARTICLES ──
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();window.addEventListener('resize',resize);
let cparts=[];
function mkC(){const cols=['rgba(0,245,255,','rgba(255,0,255,','rgba(0,128,255,','rgba(180,160,255,'],c=cols[Math.floor(Math.random()*cols.length)],a=Math.random()*Math.PI*2,s=Math.random()*0.3+0.05;return{x:mx+(Math.random()-.5)*8,y:my+(Math.random()-.5)*8,vx:Math.cos(a)*s,vy:Math.sin(a)*s-0.06,r:Math.random()*2+0.5,a:0.6,da:-(Math.random()*0.005+0.002),color:c};}
let st=0;
(function dp(){ctx.clearRect(0,0,W,H);if(++st%4===0)cparts.push(mkC());cparts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy-=0.002;p.a+=p.da;if(p.a<=0)return;const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*5);g.addColorStop(0,p.color+(p.a*0.3).toFixed(3)+')');g.addColorStop(1,p.color+'0)');ctx.beginPath();ctx.arc(p.x,p.y,p.r*5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color+p.a.toFixed(3)+')';ctx.fill();});cparts=cparts.filter(p=>p.a>0);requestAnimationFrame(dp);})();

// ── GLASS LENS + WARP ──
const warpLayer  = document.getElementById('warp-layer');
const lensDeco   = document.getElementById('lens-deco');
const warpTurb   = document.getElementById('warp-turb');
const warpDisp   = document.getElementById('warp-disp');

let LENS_R = Math.min(140, innerWidth*0.13);
function getLensR(){return Math.min(140,innerWidth*0.13);}
window.addEventListener('resize',()=>{LENS_R=getLensR();lensDeco.style.width=lensDeco.style.height=(LENS_R*2)+'px';});
lensDeco.style.width=lensDeco.style.height=(LENS_R*2)+'px';

let lx=innerWidth/2,ly=innerHeight/2,ltx=lx,lty=ly,lvx=0,lvy=0;
document.addEventListener('mousemove',e=>{ltx=e.clientX;lty=e.clientY;});
document.addEventListener('touchmove',e=>{ltx=e.touches[0].clientX;lty=e.touches[0].clientY;},{passive:true});

let frame=0;
(function animLens(){
  LENS_R=getLensR();
  const px=lx,py=ly;
  lx+=(ltx-lx)*0.1; ly+=(lty-ly)*0.1;
  lvx=lx-px; lvy=ly-py;
  const spd=Math.sqrt(lvx*lvx+lvy*lvy);
  frame++;

  // Update clip-path circle to follow lens
  const clip=`circle(${LENS_R}px at ${lx}px ${ly}px)`;
  warpLayer.style.clipPath=clip;
  warpLayer.style.webkitClipPath=clip;

  // Position decorations
  lensDeco.style.left=lx+'px';
  lensDeco.style.top=ly+'px';

  // Squish
  lensDeco.classList.remove('squish-h','squish-v');
  if(spd>2) lensDeco.classList.add(Math.abs(lvx)>Math.abs(lvy)?'squish-h':'squish-v');

  // Animate turbulence frequency only when moving
  const bf=0.010+spd*0.0008;
  warpTurb.setAttribute('baseFrequency',`${bf.toFixed(4)} ${(bf*1.4).toFixed(4)}`);
  warpDisp.setAttribute('scale', (45+spd*5).toFixed(1));

  requestAnimationFrame(animLens);
})();

// ── FLOATING BUBBLES ──
const container=document.getElementById('bubbles-container');
const BUBBLE_COUNT=21;
const sizePool=[18,28,22,32,15,25,20,35,12,30,17,24,14,26,19,22,16,28,21,18,24];
const bubbles=[];

// Create per-bubble warp layers (same filter as cursor lens)
const bubbleWarps=[];
for(let i=0;i<BUBBLE_COUNT;i++){
  const wl=document.createElement('div');
  wl.style.cssText=`position:fixed;inset:0;z-index:44;pointer-events:none;filter:url(#bubble-warp);clip-path:circle(0px at 0px 0px);-webkit-clip-path:circle(0px at 0px 0px);will-change:clip-path;backdrop-filter:brightness(1.12) saturate(1.8) contrast(1.08);-webkit-backdrop-filter:brightness(1.12) saturate(1.8) contrast(1.08);`;
  document.body.appendChild(wl);
  bubbleWarps.push(wl);
}

for(let i=0;i<BUBBLE_COUNT;i++){
  const s=sizePool[i%sizePool.length],r=s/2;
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;width:${s}px;height:${s}px;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:46;`;
  el.innerHTML=`
    <div style="position:absolute;inset:0;border-radius:50%;"></div>
    <div style="position:absolute;top:10%;left:12%;width:40%;height:28%;border-radius:50%;background:radial-gradient(ellipse,rgba(255,255,255,0.82) 0%,rgba(255,255,255,0.2) 45%,transparent 100%);filter:blur(1px);"></div>
    <div style="position:absolute;bottom:14%;right:12%;width:22%;height:16%;border-radius:50%;background:radial-gradient(ellipse,rgba(0,245,255,0.55) 0%,rgba(180,140,255,0.2) 55%,transparent 100%);filter:blur(1.5px);"></div>
    <div style="position:absolute;inset:0;border-radius:50%;border:1px solid rgba(255,255,255,0.22);box-shadow:inset 0 0 0 1px rgba(0,245,255,0.15),0 0 8px rgba(0,245,255,0.06);"></div>`;
  container.appendChild(el);
  bubbles.push({el,r,x:r+Math.random()*(innerWidth-r*2),y:r+Math.random()*(innerHeight-r*2),vx:(Math.random()-.5)*0.45,vy:(Math.random()-.5)*0.45,phase:Math.random()*Math.PI*2,phase2:Math.random()*Math.PI*2,ws:0.005+Math.random()*0.007});
}

(function ab(){
  const now=performance.now()*0.001;
  bubbles.forEach((b,i)=>{
    b.vx+=Math.sin(now*b.ws+b.phase)*0.011;b.vy+=Math.cos(now*b.ws*1.3+b.phase2)*0.009;
    const cdx=b.x-lx,cdy=b.y-ly,cd=Math.sqrt(cdx*cdx+cdy*cdy),pr=LENS_R+b.r+20;
    if(cd<pr&&cd>0.5){const f=Math.pow((pr-cd)/pr,1.8)*2;b.vx+=(cdx/cd)*f;b.vy+=(cdy/cd)*f;}
    bubbles.forEach((o,j)=>{if(j<=i)return;const dx=b.x-o.x,dy=b.y-o.y,d=Math.sqrt(dx*dx+dy*dy),md=(b.r+o.r)*0.85;if(d<md&&d>0.5){const f=(md-d)/md*0.25,nx=dx/d,ny=dy/d;b.vx+=nx*f;b.vy+=ny*f;o.vx-=nx*f;o.vy-=ny*f;}});
    b.vx*=0.97;b.vy*=0.97;
    if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx)*0.65;}if(b.x+b.r>innerWidth){b.x=innerWidth-b.r;b.vx=-Math.abs(b.vx)*0.65;}
    if(b.y-b.r<0){b.y=b.r;b.vy=Math.abs(b.vy)*0.65;}if(b.y+b.r>innerHeight){b.y=innerHeight-b.r;b.vy=-Math.abs(b.vy)*0.65;}
    b.x+=b.vx;b.y+=b.vy;
    b.el.style.left=b.x+'px';b.el.style.top=b.y+'px';
    // update warp clip for this bubble
    const clip=`circle(${b.r}px at ${b.x}px ${b.y}px)`;
    bubbleWarps[i].style.clipPath=clip;
    bubbleWarps[i].style.webkitClipPath=clip;
  });
  requestAnimationFrame(ab);
})();
</script>
