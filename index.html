<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AL MUKIT</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@200;300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--cyan:#00f5ff;--magenta:#ff00ff;--blue:#0080ff;--deep:#000408;}
html,body{width:100%;height:100%;background:var(--deep);color:#e8f4ff;font-family:'Syne',sans-serif;overflow:hidden;cursor:none;}

/* CURSOR */
#cur,#cur-ring{display:none;}
@media(pointer:fine){
  #cur{display:block;position:fixed;z-index:99999;pointer-events:none;width:8px;height:8px;border-radius:50%;background:var(--cyan);transform:translate(-50%,-50%);box-shadow:0 0 12px var(--cyan);mix-blend-mode:screen;}
  #cur-ring{display:block;position:fixed;z-index:99998;pointer-events:none;width:34px;height:34px;border-radius:50%;border:1px solid rgba(0,245,255,0.28);transform:translate(-50%,-50%);transition:width .15s,height .15s;}
  body.hover #cur{background:var(--magenta);}
  body.hover #cur-ring{width:48px;height:48px;border-color:rgba(255,0,255,0.3);}
}

/* CANVASES */
#bg-canvas,#cv{position:fixed;inset:0;z-index:0;pointer-events:none;}
#cv{z-index:1;}

/* OVERLAYS */
.scanlines{position:fixed;inset:0;z-index:5;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);}
.edge-glow{position:fixed;inset:0;z-index:3;pointer-events:none;box-shadow:inset 0 0 100px rgba(0,245,255,0.04),inset 0 0 50px rgba(0,0,0,0.5);}
.bracket{position:fixed;z-index:20;pointer-events:none;width:20px;height:20px;}
.bracket.tl{top:20px;left:20px;border-top:1px solid rgba(0,245,255,0.2);border-left:1px solid rgba(0,245,255,0.2);}
.bracket.tr{top:20px;right:20px;border-top:1px solid rgba(0,245,255,0.2);border-right:1px solid rgba(0,245,255,0.2);}
.bracket.bl{bottom:20px;left:20px;border-bottom:1px solid rgba(0,245,255,0.2);border-left:1px solid rgba(0,245,255,0.2);}
.bracket.br{bottom:20px;right:20px;border-bottom:1px solid rgba(0,245,255,0.2);border-right:1px solid rgba(0,245,255,0.2);}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:clamp(18px,3.5vw,30px) clamp(20px,5vw,44px);display:flex;align-items:center;justify-content:space-between;}
.logo{font-size:clamp(9px,1.5vw,11px);font-weight:400;letter-spacing:0.45em;text-transform:uppercase;cursor:none;color:rgba(232,244,255,0.45);font-family:'Space Mono',monospace;}
.ham{display:flex;flex-direction:column;gap:6px;cursor:none;padding:8px;z-index:300;}
.ham span{display:block;width:22px;height:1px;background:rgba(232,244,255,0.3);transition:all 0.4s cubic-bezier(0.23,1,0.32,1);transform-origin:center;}
.ham.open span:nth-child(1){transform:translateY(7px) rotate(45deg);background:var(--cyan);}
.ham.open span:nth-child(2){opacity:0;transform:scaleX(0);}
.ham.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);background:var(--cyan);}
.status-bar{position:fixed;top:clamp(22px,3.5vw,36px);left:50%;transform:translateX(-50%);z-index:150;font-family:'Space Mono',monospace;font-size:clamp(7px,1vw,8px);letter-spacing:0.4em;text-transform:uppercase;color:rgba(232,244,255,0.1);display:flex;align-items:center;gap:14px;white-space:nowrap;}
.status-dot{width:3px;height:3px;border-radius:50%;background:var(--cyan);opacity:0.4;animation:pulse 2.5s ease-in-out infinite;}

/* DROPDOWN */
.menu-drop{position:fixed;top:0;right:0;bottom:0;width:min(300px,85vw);z-index:250;background:rgba(0,4,8,0.94);backdrop-filter:blur(40px);border-left:1px solid rgba(255,255,255,0.05);padding:clamp(70px,12vh,100px) clamp(24px,5vw,44px) 50px;display:flex;flex-direction:column;justify-content:space-between;transform:translateX(100%);transition:transform 0.55s cubic-bezier(0.23,1,0.32,1);pointer-events:none;}
.menu-drop.open{transform:translateX(0);pointer-events:all;}
.menu-links{display:flex;flex-direction:column;}
.menu-link{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid rgba(255,255,255,0.04);text-decoration:none;color:rgba(232,244,255,0.22);font-size:clamp(9px,1.5vw,11px);font-family:'Space Mono',monospace;letter-spacing:0.35em;text-transform:uppercase;cursor:none;opacity:0;transform:translateX(16px);transition:color 0.3s,opacity 0.45s,transform 0.45s;}
.menu-drop.open .menu-link:nth-child(1){opacity:1;transform:none;transition-delay:0.1s;}
.menu-drop.open .menu-link:nth-child(2){opacity:1;transform:none;transition-delay:0.16s;}
.menu-drop.open .menu-link:nth-child(3){opacity:1;transform:none;transition-delay:0.22s;}
.menu-drop.open .menu-link:nth-child(4){opacity:1;transform:none;transition-delay:0.28s;}
.menu-link:hover,.menu-link.highlight:hover{color:var(--cyan);}
.menu-link.highlight{color:rgba(232,244,255,0.35);}
.menu-num{font-size:7px;color:rgba(0,245,255,0.28);letter-spacing:0.2em;}
.menu-arrow{font-size:10px;opacity:0;transition:all 0.3s;}
.menu-link:hover .menu-arrow{transform:translateX(4px);opacity:0.6;color:var(--cyan);}
.menu-foot{font-family:'Space Mono',monospace;font-size:clamp(7px,1vw,8px);color:rgba(232,244,255,0.1);line-height:2.4;letter-spacing:0.15em;opacity:0;transition:opacity 0.5s 0.35s;}
.menu-drop.open .menu-foot{opacity:1;}

/* HERO */
.hero{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:clamp(80px,12vh,120px) clamp(20px,6vw,60px);}
.hero-tag{font-family:'Space Mono',monospace;font-size:clamp(7px,1.2vw,9px);letter-spacing:0.5em;text-transform:uppercase;color:rgba(0,245,255,0.4);margin-bottom:clamp(18px,3.5vh,32px);opacity:0;}
.hero-title{font-weight:200;margin-bottom:clamp(18px,3.5vh,32px);opacity:0;}
.t1{display:block;color:rgba(232,244,255,0.25);font-size:clamp(10px,1.8vw,16px);font-weight:300;letter-spacing:0.55em;text-transform:uppercase;font-family:'Space Mono',monospace;margin-bottom:clamp(6px,1.5vh,14px);}
.t2{display:block;font-size:clamp(44px,9vw,120px);line-height:0.88;font-weight:200;letter-spacing:-0.03em;color:#e8f4ff;}
.t2 .col{background:linear-gradient(135deg,var(--cyan),var(--blue) 40%,var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 25px rgba(0,245,255,0.28));}
.hero-line{width:1px;height:clamp(28px,4.5vh,45px);background:linear-gradient(to bottom,transparent,rgba(0,245,255,0.25),transparent);margin:0 auto;opacity:0;}
.hero-sub{max-width:min(340px,85vw);font-size:clamp(8px,1.4vw,10px);line-height:2.3;color:rgba(232,244,255,0.16);font-family:'Space Mono',monospace;letter-spacing:0.06em;margin-top:clamp(16px,3vh,28px);opacity:0;}

/* BUTTONS */
.btn-contact{position:fixed;bottom:clamp(22px,4.5vh,38px);left:clamp(18px,4vw,40px);z-index:100;display:flex;align-items:center;gap:10px;padding:clamp(9px,2vh,12px) clamp(14px,3vw,22px);background:transparent;border:1px solid rgba(255,255,255,0.06);cursor:none;transition:all 0.35s;opacity:0;}
.btn-contact:hover{border-color:rgba(0,245,255,0.18);}
.btn-contact span{font-family:'Space Mono',monospace;font-size:clamp(7px,1vw,8px);letter-spacing:0.35em;text-transform:uppercase;color:rgba(232,244,255,0.25);transition:color 0.3s;}
.btn-contact:hover span{color:rgba(0,245,255,0.55);}
.btn-dot{width:3px;height:3px;border-radius:50%;background:var(--cyan);opacity:0.45;animation:pulse 2s ease-in-out infinite;}
.btn-music{position:fixed;bottom:clamp(22px,4.5vh,38px);right:clamp(18px,4vw,40px);z-index:100;width:38px;height:38px;border-radius:50%;background:transparent;border:1px solid rgba(255,255,255,0.06);cursor:none;display:flex;align-items:center;justify-content:center;transition:all 0.35s;opacity:0;}
.btn-music:hover{border-color:rgba(255,0,255,0.18);}
.music-bars{display:flex;align-items:flex-end;gap:2px;height:12px;}
.music-bar{width:2px;background:rgba(232,244,255,0.2);transition:background 0.3s;}
.btn-music:hover .music-bar,.btn-music.playing .music-bar{background:rgba(0,245,255,0.45);}
.mb1{height:4px;animation:bar 1.1s ease-in-out infinite;}
.mb2{height:9px;animation:bar 0.8s ease-in-out infinite 0.2s;}
.mb3{height:6px;animation:bar 1.3s ease-in-out infinite 0.1s;}
.mb4{height:11px;animation:bar 0.9s ease-in-out infinite 0.3s;}

/* FOOTER */
footer{position:fixed;bottom:0;left:0;right:0;z-index:50;padding:0 clamp(20px,4vw,44px) clamp(10px,2vh,16px);pointer-events:none;display:flex;justify-content:center;opacity:0;}
.footer-copy{font-family:'Space Mono',monospace;font-size:clamp(7px,1vw,8px);letter-spacing:0.22em;text-transform:uppercase;color:rgba(232,244,255,0.07);line-height:1.8;text-align:center;}
.footer-copy a{color:rgba(0,245,255,0.12);text-decoration:none;pointer-events:all;cursor:none;transition:color 0.3s;}
.footer-copy a:hover{color:rgba(0,245,255,0.35);}

/* ── GLASS LENS ──
   The CORRECT working approach:
   1. A full-page "warp layer" that is an exact visual copy of the page
      rendered via CSS filter:url(#warp-filter) which runs feTurbulence displacement
   2. This warp layer is clipped to the lens circle via clip-path
   3. Result: only the area under the lens shows the warped/distorted content
   4. The lens rim/specular sit on top as decoration
*/
#warp-layer{
  position:fixed;inset:0;z-index:800;pointer-events:none;
  /* This filter warps everything rendered inside this element */
  filter:url(#warp-filter);
  /* Clip to lens circle - updated via JS */
  clip-path:circle(0px at 50% 50%);
  -webkit-clip-path:circle(0px at 50% 50%);
  /* Force GPU layer */
  will-change:clip-path;
  /* The warp layer needs to show the page content - use backdrop-filter trick */
  backdrop-filter:brightness(1.12) saturate(1.6) contrast(1.05);
  -webkit-backdrop-filter:brightness(1.12) saturate(1.6) contrast(1.05);
  background:rgba(0,245,255,0.025);
}

/* lens decorations sit above warp layer */
#lens-deco{
  position:fixed;z-index:900;pointer-events:none;
  width:clamp(160px,20vw,280px);height:clamp(160px,20vw,280px);
  transform:translate(-50%,-50%);will-change:left,top;
  border-radius:50%;
  transition:border-radius 0.3s cubic-bezier(0.23,1,0.32,1);
}
#lens-rim{
  position:absolute;inset:0;border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.3);
  box-shadow:
    inset 0 0 0 1px rgba(0,245,255,0.4),
    inset 1px 1px 0 rgba(255,80,180,0.22),
    inset -1px -1px 0 rgba(100,200,255,0.22),
    0 0 40px rgba(0,245,255,0.2),
    0 0 80px rgba(180,140,255,0.12);
  animation:rimPulse 4s ease-in-out infinite;
}
#lens-spec{position:absolute;top:10%;left:12%;width:36%;height:24%;border-radius:50%;background:radial-gradient(ellipse at 38% 40%,rgba(255,255,255,0.88) 0%,rgba(255,255,255,0.25) 40%,transparent 100%);filter:blur(3px);animation:specShift 5s ease-in-out infinite;}
#lens-spec2{position:absolute;bottom:14%;right:12%;width:24%;height:17%;border-radius:50%;background:radial-gradient(ellipse,rgba(0,245,255,0.6) 0%,rgba(180,140,255,0.28) 50%,transparent 100%);filter:blur(5px);animation:specShift 7s ease-in-out infinite reverse;}

@keyframes specShift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(4px,3px) scale(1.07)}}
@keyframes rimPulse{
  0%,100%{box-shadow:inset 0 0 0 1px rgba(0,245,255,0.4),inset 1px 1px 0 rgba(255,80,180,0.22),inset -1px -1px 0 rgba(100,200,255,0.22),0 0 40px rgba(0,245,255,0.2),0 0 80px rgba(180,140,255,0.12);}
  50%{box-shadow:inset 0 0 0 1px rgba(0,245,255,0.6),inset 1px 1px 0 rgba(255,80,180,0.38),inset -1px -1px 0 rgba(100,200,255,0.38),0 0 60px rgba(0,245,255,0.32),0 0 120px rgba(180,140,255,0.2);}
}
#lens-deco.squish-h,#lens-deco.squish-h *{border-radius:56% 44%/42% 58%;}
#lens-deco.squish-v,#lens-deco.squish-v *{border-radius:42% 58%/56% 44%;}

/* KEYFRAMES */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes bar{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.3)}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlideDown{from{opacity:0;transform:translateY(-28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlideLeft{from{opacity:0;transform:translateX(-28px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeSlideRight{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes scaleFade{from{opacity:0;transform:scale(0.88)}to{opacity:1;transform:scale(1)}}
@keyframes blurFade{from{opacity:0;filter:blur(14px)}to{opacity:1;filter:blur(0)}}
</style>
</head>
<body>

<!-- SVG FILTERS -->
<svg style="position:fixed;width:0;height:0;pointer-events:none;" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Warp filter applied to the warp-layer — this distorts the backdrop -->
    <filter id="warp-filter" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feTurbulence id="warp-turb" type="fractalNoise" baseFrequency="0.012 0.015" numOctaves="3" seed="7" result="noise"/>
      <feDisplacementMap id="warp-disp" in="SourceGraphic" in2="noise" scale="80" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
</svg>

<!-- CURSORS -->
<div id="cur"></div>
<div id="cur-ring"></div>

<!-- CANVASES -->
<canvas id="bg-canvas"></canvas>
<div class="scanlines"></div>
<div class="edge-glow"></div>
<div class="bracket tl"></div><div class="bracket tr"></div>
<div class="bracket bl"></div><div class="bracket br"></div>
<canvas id="cv"></canvas>

<!-- NAV -->
<nav>
  <div class="logo">Al Mukit</div>
  <div class="status-bar"><span class="status-dot"></span><span>Online</span><span>·</span><span id="clock">00:00:00</span></div>
  <div class="ham" id="ham"><span></span><span></span><span></span></div>
</nav>

<!-- DROPDOWN -->
<div class="menu-drop" id="menu">
  <div class="menu-links">
    <a href="#" class="menu-link highlight"><span class="menu-num">01</span>Portfolio<span class="menu-arrow">→</span></a>
    <a href="#" class="menu-link highlight"><span class="menu-num">02</span>Book<span class="menu-arrow">→</span></a>
    <a href="#" class="menu-link"><span class="menu-num">03</span>About<span class="menu-arrow">→</span></a>
    <a href="#" class="menu-link"><span class="menu-num">04</span>Contact<span class="menu-arrow">→</span></a>
  </div>
  <div class="menu-foot">hello@almukit.io<br>© 2025 Al Mukit</div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-tag" id="htag">Spatial Interface — 2025</div>
  <h1 class="hero-title" id="htitle">
    <span class="t1">Want to</span>
    <span class="t2">Fly <span class="col">High</span></span>
  </h1>
  <div class="hero-line" id="hline"></div>
  <p class="hero-sub" id="hsub">Liquid glass platform built at the<br>edge of perception and reality.</p>
</section>

<!-- WARP LAYER — clips to lens, shows distorted content -->
<div id="warp-layer"></div>

<!-- LENS DECORATIONS -->
<div id="lens-deco">
  <div id="lens-rim"></div>
  <div id="lens-spec"></div>
  <div id="lens-spec2"></div>
</div>

<!-- FLOATING BUBBLES -->
<div id="bubbles-container"></div>

<!-- BUTTONS -->
<button class="btn-contact" id="bcontact"><span class="btn-dot"></span><span>Contact Us</span></button>
<button class="btn-music" id="btn-music">
  <div class="music-bars">
    <div class="music-bar mb1"></div><div class="music-bar mb2"></div>
    <div class="music-bar mb3"></div><div class="music-bar mb4"></div>
  </div>
</button>

<!-- FOOTER -->
<footer id="footer">
  <div class="footer-copy">© 2025 Al Mukit · <a href="mailto:hello@almukit.io">hello@almukit.io</a> · <a href="#">Privacy</a></div>
</footer>

<script>
// ── ENTRANCE ANIMATIONS ──
const anims=['fadeSlideUp','fadeSlideDown','fadeSlideLeft','fadeSlideRight','scaleFade','blurFade'];
function rAnim(el,delay,dur=0.85){if(!el)return;el.style.animation=`${anims[Math.floor(Math.random()*anims.length)]} ${dur}s cubic-bezier(0.23,1,0.32,1) ${delay}s both`;}
rAnim(document.getElementById('htag'), 0.05);
rAnim(document.getElementById('htitle'),0.18,1.0);
rAnim(document.getElementById('hline'),0.32,0.7);
rAnim(document.getElementById('hsub'), 0.42);
setTimeout(()=>{
  ['bcontact','btn-music','footer'].forEach((id,i)=>{const el=document.getElementById(id);if(el){rAnim(el,i*0.1,0.7);el.style.opacity='';}});
},700);

// ── CLOCK ──
(function tick(){const n=new Date();document.getElementById('clock').textContent=[n.getHours(),n.getMinutes(),n.getSeconds()].map(v=>String(v).padStart(2,'0')).join(':');setTimeout(tick,1000);})();

// ── CURSOR ──
const cur=document.getElementById('cur'),ring=document.getElementById('cur-ring');
let mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function ar(){rx+=(mx-rx)*0.13;ry+=(my-ry)*0.13;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(ar);})();
document.querySelectorAll('button,a,.ham').forEach(el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('hover'));el.addEventListener('mouseleave',()=>document.body.classList.remove('hover'));});

// ── HAMBURGER ──
const ham=document.getElementById('ham'),menuEl=document.getElementById('menu');
let menuOpen=false;
ham.addEventListener('click',()=>{menuOpen=!menuOpen;ham.classList.toggle('open',menuOpen);menuEl.classList.toggle('open',menuOpen);});
document.addEventListener('click',e=>{if(menuOpen&&!menuEl.contains(e.target)&&!ham.contains(e.target)){menuOpen=false;ham.classList.remove('open');menuEl.classList.remove('open');}});
document.getElementById('btn-music').addEventListener('click',function(){this.classList.toggle('playing');});

// ── STAR BG ──
const bgC=document.getElementById('bg-canvas'),bgX=bgC.getContext('2d');
let stars=[];
function resizeBg(){bgC.width=innerWidth;bgC.height=innerHeight;stars=Array.from({length:600},()=>({x:Math.random()*bgC.width,y:Math.random()*bgC.height,r:Math.random()*1.8+0.2,a:Math.random(),da:(Math.random()-0.5)*0.005,col:Math.random()>0.75?'rgba(0,245,255,':Math.random()>0.6?'rgba(255,0,255,':Math.random()>0.45?'rgba(0,128,255,':Math.random()>0.3?'rgba(180,100,255,':'rgba(180,220,255,'}));}
resizeBg();window.addEventListener('resize',resizeBg);
(function db(){bgX.clearRect(0,0,bgC.width,bgC.height);stars.forEach(s=>{s.a+=s.da;if(s.a<=0||s.a>=1)s.da*=-1;bgX.beginPath();bgX.arc(s.x,s.y,s.r,0,Math.PI*2);bgX.fillStyle=s.col+Math.max(0,Math.min(1,s.a)).toFixed(2)+')';bgX.fill();});requestAnimationFrame(db);})();

// ── CURSOR PARTICLES ──
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
resize();window.addEventListener('resize',resize);
let cparts=[];
function mkC(){const cols=['rgba(0,245,255,','rgba(255,0,255,','rgba(0,128,255,','rgba(180,160,255,'],c=cols[Math.floor(Math.random()*cols.length)],a=Math.random()*Math.PI*2,s=Math.random()*0.3+0.05;return{x:mx+(Math.random()-.5)*8,y:my+(Math.random()-.5)*8,vx:Math.cos(a)*s,vy:Math.sin(a)*s-0.06,r:Math.random()*2+0.5,a:0.6,da:-(Math.random()*0.005+0.002),color:c};}
let st=0;
(function dp(){ctx.clearRect(0,0,W,H);if(++st%4===0)cparts.push(mkC());cparts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy-=0.002;p.a+=p.da;if(p.a<=0)return;const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*5);g.addColorStop(0,p.color+(p.a*0.3).toFixed(3)+')');g.addColorStop(1,p.color+'0)');ctx.beginPath();ctx.arc(p.x,p.y,p.r*5,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color+p.a.toFixed(3)+')';ctx.fill();});cparts=cparts.filter(p=>p.a>0);requestAnimationFrame(dp);})();

// ── GLASS LENS + WARP ──
const warpLayer  = document.getElementById('warp-layer');
const lensDeco   = document.getElementById('lens-deco');
const warpTurb   = document.getElementById('warp-turb');
const warpDisp   = document.getElementById('warp-disp');

let LENS_R = Math.min(140, innerWidth*0.13);
function getLensR(){return Math.min(140,innerWidth*0.13);}
window.addEventListener('resize',()=>{LENS_R=getLensR();lensDeco.style.width=lensDeco.style.height=(LENS_R*2)+'px';});
lensDeco.style.width=lensDeco.style.height=(LENS_R*2)+'px';

let lx=innerWidth/2,ly=innerHeight/2,ltx=lx,lty=ly,lvx=0,lvy=0;
document.addEventListener('mousemove',e=>{ltx=e.clientX;lty=e.clientY;});
document.addEventListener('touchmove',e=>{ltx=e.touches[0].clientX;lty=e.touches[0].clientY;},{passive:true});

let frame=0;
(function animLens(){
  LENS_R=getLensR();
  const px=lx,py=ly;
  lx+=(ltx-lx)*0.1; ly+=(lty-ly)*0.1;
  lvx=lx-px; lvy=ly-py;
  const spd=Math.sqrt(lvx*lvx+lvy*lvy);
  frame++;

  // Update clip-path circle to follow lens
  const clip=`circle(${LENS_R}px at ${lx}px ${ly}px)`;
  warpLayer.style.clipPath=clip;
  warpLayer.style.webkitClipPath=clip;

  // Position decorations
  lensDeco.style.left=lx+'px';
  lensDeco.style.top=ly+'px';

  // Squish
  lensDeco.classList.remove('squish-h','squish-v');
  if(spd>2) lensDeco.classList.add(Math.abs(lvx)>Math.abs(lvy)?'squish-h':'squish-v');

  // Animate turbulence — more movement = more distortion
  const bf=0.010+spd*0.0008;
  warpTurb.setAttribute('baseFrequency',`${bf.toFixed(4)} ${(bf*1.4).toFixed(4)}`);
  warpDisp.setAttribute('scale', (80+spd*8).toFixed(1));

  // Slow seed drift for organic ripple
  warpTurb.setAttribute('seed', Math.floor(frame*0.05)%99);

  requestAnimationFrame(animLens);
})();

// ── FLOATING BUBBLES ──
const container=document.getElementById('bubbles-container');
const BUBBLE_COUNT=21;
const sizePool=[18,28,22,32,15,25,20,35,12,30,17,24,14,26,19,22,16,28,21,18,24];
const bubbles=[];
for(let i=0;i<BUBBLE_COUNT;i++){
  const s=sizePool[i%sizePool.length],r=s/2;
  const el=document.createElement('div');
  el.style.cssText=`position:fixed;width:${s}px;height:${s}px;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:45;`;
  el.innerHTML=`
    <div style="position:absolute;inset:0;border-radius:50%;backdrop-filter:blur(2px) saturate(2) brightness(1.1);-webkit-backdrop-filter:blur(2px) saturate(2) brightness(1.1);background:radial-gradient(ellipse at 38% 32%,rgba(0,245,255,0.03) 0%,rgba(180,140,255,0.015) 50%,transparent 100%);"></div>
    <div style="position:absolute;top:10%;left:12%;width:36%;height:24%;border-radius:50%;background:radial-gradient(ellipse,rgba(255,255,255,0.7) 0%,rgba(255,255,255,0.18) 45%,transparent 100%);filter:blur(1.5px);"></div>
    <div style="position:absolute;bottom:14%;right:12%;width:20%;height:14%;border-radius:50%;background:radial-gradient(ellipse,rgba(0,245,255,0.4) 0%,rgba(180,140,255,0.15) 55%,transparent 100%);filter:blur(2px);"></div>
    <div style="position:absolute;inset:0;border-radius:50%;border:1px solid rgba(255,255,255,0.14);"></div>`;
  container.appendChild(el);
  bubbles.push({el,r,x:r+Math.random()*(innerWidth-r*2),y:r+Math.random()*(innerHeight-r*2),vx:(Math.random()-.5)*0.45,vy:(Math.random()-.5)*0.45,phase:Math.random()*Math.PI*2,phase2:Math.random()*Math.PI*2,ws:0.005+Math.random()*0.007});
}
(function ab(){
  const now=performance.now()*0.001;
  bubbles.forEach((b,i)=>{
    b.vx+=Math.sin(now*b.ws+b.phase)*0.011;b.vy+=Math.cos(now*b.ws*1.3+b.phase2)*0.009;
    const cdx=b.x-lx,cdy=b.y-ly,cd=Math.sqrt(cdx*cdx+cdy*cdy),pr=LENS_R+b.r+20;
    if(cd<pr&&cd>0.5){const f=Math.pow((pr-cd)/pr,1.8)*2;b.vx+=(cdx/cd)*f;b.vy+=(cdy/cd)*f;}
    bubbles.forEach((o,j)=>{if(j<=i)return;const dx=b.x-o.x,dy=b.y-o.y,d=Math.sqrt(dx*dx+dy*dy),md=(b.r+o.r)*0.85;if(d<md&&d>0.5){const f=(md-d)/md*0.25,nx=dx/d,ny=dy/d;b.vx+=nx*f;b.vy+=ny*f;o.vx-=nx*f;o.vy-=ny*f;}});
    b.vx*=0.97;b.vy*=0.97;
    if(b.x-b.r<0){b.x=b.r;b.vx=Math.abs(b.vx)*0.65;}if(b.x+b.r>innerWidth){b.x=innerWidth-b.r;b.vx=-Math.abs(b.vx)*0.65;}
    if(b.y-b.r<0){b.y=b.r;b.vy=Math.abs(b.vy)*0.65;}if(b.y+b.r>innerHeight){b.y=innerHeight-b.r;b.vy=-Math.abs(b.vy)*0.65;}
    b.x+=b.vx;b.y+=b.vy;b.el.style.left=b.x+'px';b.el.style.top=b.y+'px';
  });
  requestAnimationFrame(ab);
})();
</script>
</body>
</html>
